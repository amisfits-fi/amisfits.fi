# ── Netlify build-konfiguraatio ───────────────────────────────────────────────
# Dokumentaatio: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Mistä hakemistosta build ajetaan
  base    = "web"
  # Build-komento
  command = "npm install && npm run build"
  # Mistä hakemistosta valmis sivusto löytyy
  publish = "dist"

# ── Ympäristömuuttujat (arvot asetetaan Netlify UI:ssa, ei tähän tiedostoon) ──
# Muista lisätä nämä Netlify → Site configuration → Environment variables:
#   PUBLIC_SANITY_PROJECT_ID   = sanity-projektin id
#   PUBLIC_SANITY_DATASET      = production
#   PUBLIC_SANITY_API_VERSION  = 2024-01-01

# ── Uudelleenohjaukset ────────────────────────────────────────────────────────
[[redirects]]
  # Juurisivu → suomenkielinen nuorten sivu
  from   = "/"
  to     = "/fi/nuoret"
  status = 301

# HUOM: /se/* → /sv/* -uudelleenohjaukset on määritelty web/public/_redirects-
# tiedostossa muiden polkuohjausten kanssa.

# ── HTTP-otsakeet (tietoturva) ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    # ⚠️ VÄLIAIKAINEN – POISTA JULKAISUN YHTEYDESSÄ! ⚠️
    # Estää hakukoneindeksoinnin, kunnes oikea sisältö ja amisfits.fi-domain
    # ovat paikallaan (keskeneräinen lorem ipsum -sivusto ei saa päätyä
    # Googleen). Kun amisfits.fi kytketään Netlifyn ensisijaiseksi domainiksi,
    # POISTA tämä rivi — muuten myös tuotantosivusto jää pois hakukoneista.
    # (Netlify ohjaa amisfits.netlify.app-osoitteen automaattisesti
    # ensisijaiselle domainille, joten duplicate content -ongelmaa ei synny.)
    X-Robots-Tag           = "noindex, nofollow"

# ── Node.js-versio ────────────────────────────────────────────────────────────
[build.environment]
  NODE_VERSION = "20"
